<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Extension</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 12px;
            width: 280px;
            color: #1f2937;
            background: #ffffff;
        }

        h3 {
            margin: 0 0 10px;
            font-size: 15px;
            font-weight: 700;
            text-align: left;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .stat {
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 8px;
            min-height: 54px;
            background: #f9fafb;
        }

        .stat-label {
            display: block;
            color: #6b7280;
            font-size: 11px;
            line-height: 1.2;
        }

        .stat-value {
            display: block;
            margin-top: 4px;
            font-size: 18px;
            font-weight: 700;
            line-height: 1;
        }

        .actions {
            display: grid;
            gap: 8px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
        }

        .toggle-row input {
            width: auto;
            margin: 0;
        }

        .import-panel {
            display: grid;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e5e7eb;
        }

        .field {
            display: grid;
            gap: 4px;
        }

        label {
            color: #4b5563;
            font-size: 11px;
            font-weight: 700;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 7px 8px;
            color: #111827;
            font: inherit;
            font-size: 12px;
        }

        textarea {
            min-height: 54px;
            resize: vertical;
        }

        button {
            min-height: 34px;
            padding: 8px 10px;
            border: 1px solid #d1d5db;
            background: #ffffff;
            color: #111827;
            cursor: pointer;
            border-radius: 6px;
            width: 100%;
            font-size: 13px;
            font-weight: 600;
        }

        button:hover {
            background: #f3f4f6;
        }

        button.primary {
            background: #2563eb;
            border-color: #2563eb;
            color: #ffffff;
        }

        button.primary:hover {
            background: #1d4ed8;
        }

        button.danger {
            background: #fee2e2;
            border-color: #fecaca;
            color: #991b1b;
        }

        button.danger:hover {
            background: #fecaca;
        }

        #popupStatus {
            min-height: 18px;
            margin: 10px 0 0;
            color: #4b5563;
            font-size: 12px;
            line-height: 1.4;
            text-align: left;
        }
    </style>
</head>
<body>
    <h3>Sticker Extension</h3>
    <div class="stats-grid" aria-label="Sticker stats">
        <div class="stat">
            <span class="stat-label">Stickers</span>
            <span class="stat-value" id="stickerCount">-</span>
        </div>
        <div class="stat">
            <span class="stat-label">Cache</span>
            <span class="stat-value" id="cacheState">-</span>
        </div>
        <div class="stat">
            <span class="stat-label">Favorite</span>
            <span class="stat-value" id="favoriteCount">-</span>
        </div>
        <div class="stat">
            <span class="stat-label">Recent</span>
            <span class="stat-value" id="recentCount">-</span>
        </div>
        <div class="stat">
            <span class="stat-label">Imported</span>
            <span class="stat-value" id="importedCount">-</span>
        </div>
    </div>
    <div class="actions">
        <label class="toggle-row" for="quickReactionsEnabled">
            <input id="quickReactionsEnabled" type="checkbox">
            Enable Quick Reactions
        </label>
        <button id="reloadStickerData" class="primary" type="button">Reload data</button>
        <button id="clearStickerCache" class="danger" type="button">Clear sticker cache</button>
    </div>
    <div class="import-panel" aria-label="Upload sticker">
        <div class="field">
            <label for="uploadFile">Image file</label>
            <input id="uploadFile" type="file" accept="image/*">
        </div>
        <div class="field">
            <label for="importName">Name</label>
            <input id="importName" type="text" placeholder="Uploaded sticker">
        </div>
        <div class="field">
            <label for="importTags">Tags</label>
            <input id="importTags" type="text" placeholder="tag1, tag2">
        </div>
        <div class="field">
            <label for="importPack">Pack</label>
            <input id="importPack" type="text" placeholder="upload-20260708">
        </div>
        <button id="uploadSticker" class="primary" type="button">Upload sticker</button>
    </div>
    <p id="popupStatus" role="status">Loading dashboard...</p>

    <script src="scripts/popup.js"></script>
</body>
</html>
